<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFD9B0"/>
      <stop offset="50%" stop-color="#FFB0A0"/>
      <stop offset="100%" stop-color="#7C5F8B"/>
    </linearGradient>
    <radialGradient id="bloom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FFE3A6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFE3A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="diyaglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FFE3A6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFE3A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"  stop-color="#FFF7D8"/>
      <stop offset="50%" stop-color="#FFD074"/>
      <stop offset="100%" stop-color="#D86A40"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#C97D4A"/>
      <stop offset="100%" stop-color="#5A3318"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- Soft bloom behind wordmark -->
  <ellipse cx="600" cy="290" rx="500" ry="180" fill="url(#bloom)"/>

  <!-- Row of diyas across the bottom edge of the village -->
  <!-- Diya helper: glow + flame + wick + bowl -->
  <g transform="translate(150,490)">
    <circle cx="0" cy="-30" r="40" fill="url(#diyaglow)"/>
    <path d="M0 -55 Q-12 -30 0 -10 Q12 -30 0 -55" fill="url(#flame)"/>
    <rect x="-3" y="-12" width="6" height="10" fill="#2A2620"/>
    <path d="M-55 0 L55 0 L48 26 L-48 26 Z" fill="url(#clay)" stroke="#3A1F0E" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="55" ry="3" fill="#1A1008" opacity="0.55"/>
  </g>
  <g transform="translate(330,510)">
    <circle cx="0" cy="-25" r="35" fill="url(#diyaglow)"/>
    <path d="M0 -45 Q-10 -25 0 -8 Q10 -25 0 -45" fill="url(#flame)"/>
    <rect x="-2.5" y="-10" width="5" height="8" fill="#2A2620"/>
    <path d="M-45 0 L45 0 L40 22 L-40 22 Z" fill="url(#clay)" stroke="#3A1F0E" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="45" ry="2.5" fill="#1A1008" opacity="0.55"/>
  </g>
  <g transform="translate(870,510)">
    <circle cx="0" cy="-25" r="35" fill="url(#diyaglow)"/>
    <path d="M0 -45 Q-10 -25 0 -8 Q10 -25 0 -45" fill="url(#flame)"/>
    <rect x="-2.5" y="-10" width="5" height="8" fill="#2A2620"/>
    <path d="M-45 0 L45 0 L40 22 L-40 22 Z" fill="url(#clay)" stroke="#3A1F0E" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="45" ry="2.5" fill="#1A1008" opacity="0.55"/>
  </g>
  <g transform="translate(1050,490)">
    <circle cx="0" cy="-30" r="40" fill="url(#diyaglow)"/>
    <path d="M0 -55 Q-12 -30 0 -10 Q12 -30 0 -55" fill="url(#flame)"/>
    <rect x="-3" y="-12" width="6" height="10" fill="#2A2620"/>
    <path d="M-55 0 L55 0 L48 26 L-48 26 Z" fill="url(#clay)" stroke="#3A1F0E" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="55" ry="3" fill="#1A1008" opacity="0.55"/>
  </g>

  <!-- A few floating spark dots above -->
  <circle cx="220" cy="200" r="4" fill="#FFE3A6" opacity="0.8"/>
  <circle cx="990" cy="180" r="3" fill="#FFE3A6" opacity="0.7"/>
  <circle cx="450" cy="120" r="3" fill="#FFE3A6" opacity="0.6"/>
  <circle cx="780" cy="140" r="4" fill="#FFE3A6" opacity="0.8"/>

  <!-- Wordmark -->
  <text x="600" y="290" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="160" font-weight="600" fill="#2A2620"
        letter-spacing="-2">Velugu</text>

  <!-- Tagline -->
  <text x="600" y="360" text-anchor="middle"
        font-family="Georgia, serif" font-style="italic"
        font-size="34" fill="#2A2620" opacity="0.78">light up Telugu</text>

  <!-- Subtagline -->
  <text x="600" y="420" text-anchor="middle"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" fill="#2A2620" opacity="0.65"
        letter-spacing="2">A COZY 30-DAY SPOKEN-TELUGU APP</text>
</svg>
