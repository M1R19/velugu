<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFD9B0"/>
      <stop offset="50%" stop-color="#FFB0A0"/>
      <stop offset="100%" stop-color="#9B7CA8"/>
    </linearGradient>
    <radialGradient id="lan" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%"  stop-color="#FFF1C2"/>
      <stop offset="55%" stop-color="#F4B860"/>
      <stop offset="100%" stop-color="#D88656"/>
    </radialGradient>
    <radialGradient id="bloom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FFE3A6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFE3A6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- Soft bloom behind the wordmark -->
  <ellipse cx="600" cy="290" rx="500" ry="180" fill="url(#bloom)"/>

  <!-- Floating lanterns -->
  <g transform="translate(180,170)">
    <line x1="0" y1="-50" x2="0" y2="-40" stroke="#2A2620" stroke-width="3"/>
    <rect x="-12" y="-58" width="24" height="9" fill="#2A2620" rx="2"/>
    <ellipse cx="0" cy="0" rx="38" ry="50" fill="url(#lan)"/>
    <rect x="-38" y="-10" width="76" height="3" fill="#2A2620" opacity="0.3"/>
  </g>
  <g transform="translate(1000,130)">
    <line x1="0" y1="-44" x2="0" y2="-34" stroke="#2A2620" stroke-width="3"/>
    <rect x="-10" y="-52" width="20" height="8" fill="#2A2620" rx="2"/>
    <ellipse cx="0" cy="0" rx="30" ry="40" fill="url(#lan)"/>
    <rect x="-30" y="-8" width="60" height="3" fill="#2A2620" opacity="0.3"/>
  </g>
  <g transform="translate(1060,360)">
    <line x1="0" y1="-36" x2="0" y2="-28" stroke="#2A2620" stroke-width="2"/>
    <rect x="-8" y="-44" width="16" height="7" fill="#2A2620" rx="2"/>
    <ellipse cx="0" cy="0" rx="22" ry="30" fill="url(#lan)"/>
  </g>
  <g transform="translate(140,420)">
    <line x1="0" y1="-30" x2="0" y2="-22" stroke="#2A2620" stroke-width="2"/>
    <rect x="-7" y="-37" width="14" height="6" fill="#2A2620" rx="2"/>
    <ellipse cx="0" cy="0" rx="18" ry="24" fill="url(#lan)"/>
  </g>

  <!-- Village silhouette -->
  <path d="M0,540 L120,540 L130,510 L200,510 L210,520 L300,520 L300,490 L350,470 L400,490 L400,540 L500,540 L520,500 L580,500 L580,540 L700,540 L720,510 L800,510 L820,495 L880,495 L880,540 L1000,540 L1020,520 L1100,520 L1100,540 L1200,540 L1200,630 L0,630 Z"
        fill="#2A2620" opacity="0.78"/>

  <!-- Wordmark -->
  <text x="600" y="300" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="160" font-weight="600" fill="#2A2620"
        letter-spacing="-2">Velugu</text>

  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle"
        font-family="Georgia, serif" font-style="italic"
        font-size="34" fill="#2A2620" opacity="0.78">light up Telugu</text>

  <!-- Subtagline -->
  <text x="600" y="430" text-anchor="middle"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" fill="#2A2620" opacity="0.65"
        letter-spacing="2">A COZY 30-DAY SPOKEN-TELUGU APP</text>
</svg>
