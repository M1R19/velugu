<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFD9B0"/>
      <stop offset="55%" stop-color="#E8896B"/>
      <stop offset="100%" stop-color="#7C5F8B"/>
    </linearGradient>
    <radialGradient id="bloom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FFE3A6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFE3A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"  stop-color="#FFF7D8"/>
      <stop offset="45%" stop-color="#FFD074"/>
      <stop offset="100%" stop-color="#D86A40"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#C97D4A"/>
      <stop offset="100%" stop-color="#5A3318"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Bloom halo behind the flame -->
  <circle cx="256" cy="220" r="200" fill="url(#bloom)"/>

  <!-- Flame -->
  <path d="M256 110
           Q210 220 256 320
           Q302 220 256 110 Z"
        fill="url(#flame)"
        filter="drop-shadow(0 0 12px rgba(244,184,96,0.7))"/>

  <!-- Wick -->
  <rect x="246" y="300" width="20" height="40" fill="#2A2620" rx="2"/>

  <!-- Clay bowl: wide shallow base with a slight pointed lip -->
  <path d="M80 340
           L432 340
           L398 432
           Q256 470 114 432 Z"
        fill="url(#clay)"
        stroke="#3A1F0E"
        stroke-width="6"/>

  <!-- Inner shadow / oil surface -->
  <ellipse cx="256" cy="340" rx="176" ry="14" fill="#1A1008" opacity="0.6"/>

  <!-- Bowl rim highlight -->
  <path d="M86 340 L426 340" stroke="#FFCB9A" stroke-width="3" opacity="0.4"/>

  <!-- Small ornament dots on bowl -->
  <circle cx="180" cy="395" r="5" fill="#FFCB9A" opacity="0.4"/>
  <circle cx="256" cy="408" r="5" fill="#FFCB9A" opacity="0.4"/>
  <circle cx="332" cy="395" r="5" fill="#FFCB9A" opacity="0.4"/>
</svg>
